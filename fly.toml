# fly.toml app configuration generated for currency_converter_cli

app = "currency-converter-cli"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  # Add any environment variables your app needs here
  # PORT will be automatically set by Fly.io

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

[checks]
  [checks.alive]
    type = "tcp"
    interval = "15s"
    timeout = "10s"
    grace_period = "5s"
